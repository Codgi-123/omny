name: CI

on:
  push:
    # 只在打 tag 时跑（发布前守门）；日常分支 push 不跑，PR 仍然全量测
    tags: ['**']
  pull_request:
  # 需要临时出包时可在 Actions 页面对任意分支手动触发
  workflow_dispatch:

jobs:
  # OmnyCore 测试：tag/PR/手动时跑（Linux 便宜，和 Windows 协作者的 WSL 环境一致）
  core-linux:
    runs-on: ubuntu-latest
    container: swift:6.0
    steps:
      - uses: actions/checkout@v4
      - name: Run OmnyCore tests
        working-directory: OmnyCore
        run: swift test

  # App 编译 + 未签名 ipa：仅手动触发（Actions 页面 Run workflow）。
  # 2026-07-12 起真机验证走 TestFlight 工作流（testflight.yml，打 tf-* tag 即云端打包上传），
  # 此 job 仅留作验证编译/临时出未签名包，不再随 push 自动跑，省 10 倍计费的 macOS 分钟。
  app-macos:
    if: github.event_name == 'workflow_dispatch'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate Xcode project
        run: |
          brew install xcodegen
          cp OmnyApp/Secrets.swift.example OmnyApp/Omny/Services/Secrets.swift
          cd OmnyApp && xcodegen generate
      - name: Run OmnyCore tests (macOS)
        working-directory: OmnyCore
        run: swift test
      - name: Build unsigned device binary
        working-directory: OmnyApp
        run: |
          xcodebuild -project Omny.xcodeproj -scheme Omny \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO \
            -derivedDataPath build build
      - name: Package unsigned ipa
        working-directory: OmnyApp
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/Omny.app Payload/
          zip -r Omny-unsigned.ipa Payload
      - uses: actions/upload-artifact@v4
        with:
          name: Omny-unsigned-ipa
          path: OmnyApp/Omny-unsigned.ipa
          retention-days: 14
