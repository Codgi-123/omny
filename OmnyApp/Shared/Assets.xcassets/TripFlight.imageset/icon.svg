<svg xmlns="http://www.w3.org/2000/svg" width="82.4" height="56.2" viewBox="11.2 32.4 82.4 56.2">
  <!-- 悬浮软阴影（不用 filter，叠两层低透明度椭圆） -->
  <ellipse cx="52" cy="84" rx="32" ry="4.5" fill="#3A4356" opacity="0.08"/>
  <ellipse cx="52" cy="84" rx="21" ry="3" fill="#3A4356" opacity="0.10"/>

  <!-- 垂直尾翼：梯形（根宽尖窄），后缘近垂直落在机尾末端，前缘约40°后掠，
       根部经背鳍弧线（dorsal fillet）融入机背 -->
  <path d="M14.8 48.8 L13.2 35.4 Q12.8 32.8 15.4 32.8 L19 32.8 Q21.2 32.8 22.2 34.4 L30 44.5 Q32 47 36.5 47.4 L36.5 48.8 Z" fill="#5B59D6"/>

  <!-- 机身 -->
  <path d="M14 47.5 L72 47 C82 47 90 50.5 93 55 C90 60 82 63 72 63 L32 63 C24 61.5 16 54.5 12.5 50.6 Q11 48.2 14 47.5 Z" fill="#F2F4F8"/>
  <!-- 机腹阴影带 -->
  <path d="M18.5 57 L89 57 C85.5 60.8 79.5 63 72 63 L32 63 C26.5 62 21.5 59.8 18.5 57 Z" fill="#D5DAE3"/>
  <!-- 机背高光 -->
  <path d="M20 47.3 L72 47 C77 47 81.5 47.9 85 49.4 L20 49.6 Z" fill="#FFFFFF" opacity="0.5"/>

  <!-- 驾驶舱风挡 -->
  <path d="M80 49.6 L85.5 49.8 C88 51.2 89.8 52.8 90.8 54.4 L80 54 Q78.5 51.6 80 49.6 Z" fill="#2E3442"/>
  <!-- 舷窗一排 -->
  <circle cx="36" cy="52.6" r="1.15" fill="#39404F" opacity="0.85"/>
  <circle cx="41.5" cy="52.6" r="1.15" fill="#39404F" opacity="0.85"/>
  <circle cx="47" cy="52.6" r="1.15" fill="#39404F" opacity="0.85"/>
  <circle cx="52.5" cy="52.6" r="1.15" fill="#39404F" opacity="0.85"/>
  <circle cx="58" cy="52.6" r="1.15" fill="#39404F" opacity="0.85"/>
  <circle cx="63.5" cy="52.6" r="1.15" fill="#39404F" opacity="0.85"/>
  <circle cx="69" cy="52.6" r="1.15" fill="#39404F" opacity="0.85"/>

  <!-- 机身描边收边（画在机翼之下，避免压出"透明翼"） -->
  <path d="M14 47.5 L72 47 C82 47 90 50.5 93 55 C90 60 82 63 72 63 L32 63 C24 61.5 16 54.5 12.5 50.6 Q11 48.2 14 47.5 Z" fill="none" stroke="#3A4356" stroke-width="1" opacity="0.25" stroke-linejoin="round"/>

  <!-- 发动机短舱（先画，让机翼盖住后半段：纯侧视胶囊形，不画进气面） -->
  <path d="M54.7 63.2 L65.8 63.2 Q69 63.2 69 66.9 Q69 70.6 65.8 70.6 L54.7 70.6 Q51.5 70.6 51.5 66.9 Q51.5 63.2 54.7 63.2 Z" fill="#C7CDD8"/>
  <path d="M54.7 63.2 L65.8 63.2 Q67.4 63.2 68.2 64.2 L52.3 64.2 Q53.1 63.2 54.7 63.2 Z" fill="#FFFFFF" opacity="0.4"/>
  <rect x="63.4" y="63.2" width="2.4" height="7.4" fill="#5B59D6" opacity="0.85"/>
  <path d="M54.7 63.2 L65.8 63.2 Q69 63.2 69 66.9 Q69 70.6 65.8 70.6 L54.7 70.6 Q51.5 70.6 51.5 66.9 Q51.5 63.2 54.7 63.2 Z" fill="none" stroke="#3A4356" stroke-width="0.8" opacity="0.2"/>

  <!-- 主翼（后画，压在发动机之上：向后下掠的梯形，根宽尖窄） -->
  <path d="M48 57 L70 57 Q72.3 57 70.8 58.7 L45.8 71 Q44.3 72 41.8 72 L38.8 72 Q36 72 37.3 69.6 Z" fill="#F4F6F9"/>
  <path d="M48 57 L70 57 Q72.3 57 70.8 58.7 L45.8 71 Q44.3 72 41.8 72 L38.8 72 Q36 72 37.3 69.6 Z" fill="none" stroke="#3A4356" stroke-width="1" opacity="0.3" stroke-linejoin="round"/>
</svg>
