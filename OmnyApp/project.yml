name: Omny
options:
  bundleIdPrefix: xin.codgi
  deploymentTarget:
    iOS: "17.0"
packages:
  OmnyCore:
    path: ../OmnyCore
# 项目级签名：Team ID 写在这里，避免每次 xcodegen generate 后丢失（两个 target 都继承）
settings:
  base:
    DEVELOPMENT_TEAM: "46SC6UDH48"
targets:
  Omny:
    type: application
    platform: iOS
    sources:
      - Omny
      - Shared
    dependencies:
      - package: OmnyCore
      - target: OmnyShare
        embed: true
    entitlements:
      path: Omny/Omny.entitlements
      properties:
        com.apple.security.application-groups:
          - group.xin.codgi.omny
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: xin.codgi.omny
        PRODUCT_NAME: Omny
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 6
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: Omny
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        # 导出合规：仅用 HTTPS（LLM/滴答），属豁免加密，声明后 TestFlight 上传不再追问出口合规
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"

  # 分享扩展：其他 App 分享面板里的「Omny」入口，见 OmnyShare/ShareViewController.swift
  OmnyShare:
    type: app-extension
    platform: iOS
    sources:
      - OmnyShare
      - Shared
    info:
      path: OmnyShare/Info.plist
      properties:
        CFBundleDisplayName: Omny
        # 版本号引用构建变量，跟主 App 保持一致（否则 XcodeGen 默认写死 1.0/1，上传报 90473 版本不一致）
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsText: true
    entitlements:
      path: OmnyShare/OmnyShare.entitlements
      properties:
        com.apple.security.application-groups:
          - group.xin.codgi.omny
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: xin.codgi.omny.share
        PRODUCT_NAME: OmnyShare
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: 0.1.0
        CURRENT_PROJECT_VERSION: 6
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1"
        CODE_SIGN_STYLE: Automatic
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        SKIP_INSTALL: YES
